<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Porcentaje Alumnos</title>
    <link rel="stylesheet" href="css/style5.css">
</head>
<body>
    <div class="container">
        <h1>Calculador de Porcentaje Alumnos</h1>
        
        <form id="formulario" name="formulario">
            
            <div class="form-group">
                <label for="cantidadHombres">Cantidad Hombres:</label>
                <!-- input para cantidad de hombres -->
                <input type="text" id="cantidadHombres" name="cantidadHombres" placeholder="Ingrese cantidad de hombres">
            </div>
            
            <div class="form-group">
                <label for="cantidadMujeres">Cantidad Mujeres:</label>
                <!-- input para cantidad de mujeres -->
                <input type="text" id="cantidadMujeres" name="cantidadMujeres" placeholder="Ingrese cantidad de mujeres">
            </div>
            
            <div class="botones">
                <!-- boton para calcular porcentajes -->
                <button type="button" class="btn btn-calcular" onclick="calcular(document.formulario)">Calcular</button>
                <button type="button" class="btn btn-limpiar" onclick="limpiar(document.formulario)">Limpiar</button>
            </div>
        </form>
        
        <!-- seccion donde se muestran los resultados -->
        <section id="resultados" class="resultados">
            <h2>Resultados</h2>
            
            <div class="resultado-item">
                <label>Total Alumnos:</label>
                <!-- span para mostrar total de alumnos -->
                <span id="totalAlumnosMostrado">0</span>
            </div>
            
            <div class="resultado-item">
                <label>Porcentaje Hombres:</label>
                <!-- span para mostrar porcentaje de hombres -->
                <span id="porcentajeHombresMostrado">0.00%</span>
            </div>
            
            <div class="resultado-item">
                <label>Porcentaje Mujeres:</label>
                <!-- span para mostrar porcentaje de mujeres -->
                <span id="porcentajeMujeresMostrado">0.00%</span>
            </div>
        </section>
    </div>
    
    <script src="JS/Ejercicio5.js"></script>
</body>
</html>
